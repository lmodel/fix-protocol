---
id: https://w3id.org/lmodel/fix-protocol/fix-post-trade
name: fix-post-trade
title: FIX Protocol Post-Trade Business Area
description: |-
  LinkML metamodel for the structural elements of the FIX Latest
  Post-Trade business area: its twelve message categories,
  area-wide message and component listings, per-category sections,
  footnotes, common-component descriptions, allocation workflow
  scenarios, trade-capture report usages, clearing services, and
  related enumerations. Original (non-normative) authored content
  only; for spec-derived prose see the private overlay
  (see NOTICE).
license: Apache-2.0
see_also:
  - https://www.fixtrading.org/standards/fix-latest-online/business-area-post-trade/
source: https://www.fixtrading.org/standards/fix-latest-online/business-area-post-trade/
version: EP284

prefixes:
  fix_protocol: https://w3id.org/lmodel/fix-protocol/
  fix_base: https://w3id.org/lmodel/fix-protocol/fix-base/
  fix_pre_trade: https://w3id.org/lmodel/fix-protocol/fix-pre-trade/
  fix_post_trade: https://w3id.org/lmodel/fix-protocol/fix-post-trade/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  dcterms: http://purl.org/dc/terms/
  skos: http://www.w3.org/2004/02/skos/core#
  xsd: http://www.w3.org/2001/XMLSchema#

default_prefix: fix_post_trade
default_range: string

imports:
  - linkml:types
  - ./fix_base
  - ./fix_pre_trade
  - ./fix_global_components

subsets:
  post_trade:
    description: Elements drawn from the FIX Latest Post-Trade chapter.
  post_trade_organization:
    description: Tabular/organizational elements (message/component tables).
  post_trade_workflow:
    description: Workflow scenarios and status enumerations.

enums:
  PostTradeCategoryEnum:
    description: |-
      The twelve message categories of the FIX Latest Post-Trade
      business area. Subset of MessageCategoryEnum.
    permissible_values:
      ALLOCATION:
      CONFIRMATION:
      SETTLEMENT_INSTRUCTION:
      TRADE_CAPTURE_REPORTING:
      REGISTRATION_INSTRUCTION:
      POSITION_MAINTENANCE:
      COLLATERAL_MANAGEMENT:
      MARGIN_REQUIREMENT_MANAGEMENT:
      ACCOUNT_REPORTING:
      TRADE_MANAGEMENT:
      PAY_MANAGEMENT:
      SETTLEMENT_STATUS_MANAGEMENT:

  PostTradeCommonComponentName:
    description: |-
      Names of the Common Components declared at the top of the
      Post-Trade business-area chapter.
    permissible_values:
      AllocCommissionDataGrp:
      AllocRegulatoryTradeIDGrp:
      ClrInstGrp:
      CollateralAmountGrp:
      CollateralReinvestmentGrp:
      DlvyInstGrp:
      ExecAllocGrp:
      MarginAmount:
      OrdAllocGrp:
      PositionAmountData:
      SettlDetails:
      SettlInstructionsData:
      SettlParties:
      SettlPtysSubGrp:
      TradeAllocAmtGrp:
      TransactionAttributeGrp:

  AllocationScenarioEnum:
    description: |-
      Communication options by which an Initiator may convey
      allocation instructions to a Respondent.
    permissible_values:
      PRE_ALLOCATED_ORDER:
      PRE_TRADE_ALLOCATION:
      POST_TRADE_ALLOCATION:
      READY_TO_BOOK:

  AllocationStatusEnum:
    description: |-
      AllocStatus(87) values used in allocation acknowledgement
      messages.
    permissible_values:
      ACCEPTED:
        meaning: fix_post_trade:AllocStatus_0
      BLOCK_LEVEL_REJECT:
        meaning: fix_post_trade:AllocStatus_1
      ACCOUNT_LEVEL_REJECT:
        meaning: fix_post_trade:AllocStatus_2
      RECEIVED_NOT_YET_PROCESSED:
        meaning: fix_post_trade:AllocStatus_3

  AllocationTransactionTypeEnum:
    description: AllocTransType(71) values.
    permissible_values:
      NEW:
        meaning: fix_post_trade:AllocTransType_0
      REPLACE:
        meaning: fix_post_trade:AllocTransType_1
      CANCEL:
        meaning: fix_post_trade:AllocTransType_2

  PostTradeAllocationPricingMethodEnum:
    description: |-
      Methods by which post-trade allocations may be computed.
    permissible_values:
      AVERAGE_PRICE:
      EXECUTED_PRICE:

  TradeCaptureReportDirectionEnum:
    description: Direction of a TradeCaptureReport relative to the marketplace.
    permissible_values:
      INBOUND:
      OUTBOUND:

  TradeCaptureReportUsageEnum:
    description: |-
      Documented usages of the TradeCaptureReport(35=AE) message.
    permissible_values:
      RELAY_CONFIRMED_TRADES_TO_NON_PARTICIPANTS:
      RELAY_CONFIRMED_TRADES_TO_COUNTERPARTIES:
      REPORTING_PRIVATELY_NEGOTIATED_TRADES:
      REPORTING_FLOOR_OR_ROUTED_EXECUTIONS:
      REQUEST_TRADE_CANCEL_OR_AMENDMENT:

  TradeCaptureReportIdentifierRoleEnum:
    description: Roles played by trade-capture-report identifier fields.
    permissible_values:
      TRADE_REPORT_ID:
      TRADE_ID:
      TRADE_REPORT_REF_ID:
      SECONDARY_TRADE_ID:

  RegistrationTransactionTypeEnum:
    description: RegistTransType(514) values.
    permissible_values:
      NEW:
        meaning: fix_post_trade:RegistTransType_0
      REPLACE:
        meaning: fix_post_trade:RegistTransType_1
      CANCEL:
        meaning: fix_post_trade:RegistTransType_2

  RegistrationStatusEnum:
    description: RegistStatus(506) values.
    permissible_values:
      ACCEPTED:
        meaning: fix_post_trade:RegistStatus_A
      REJECTED:
        meaning: fix_post_trade:RegistStatus_R
      HELD:
        meaning: fix_post_trade:RegistStatus_H
      REMINDER:
        meaning: fix_post_trade:RegistStatus_N

  SettlementInstructionModeEnum:
    description: SettlInstMode(160) values relevant in Post-Trade.
    permissible_values:
      STANDING_INSTRUCTIONS:
        meaning: fix_post_trade:SettlInstMode_1
      SPECIFIC_ORDER:
        meaning: fix_post_trade:SettlInstMode_4
      REQUEST_REJECT:
        meaning: fix_post_trade:SettlInstMode_5

  SettlementObligationModeEnum:
    description: SettlObligMode(1159) values.
    permissible_values:
      PRELIMINARY:
        meaning: fix_post_trade:SettlObligMode_1
      FINAL:
        meaning: fix_post_trade:SettlObligMode_2

  PositionMaintenanceActionEnum:
    description: PosMaintAction(712) values.
    permissible_values:
      NEW:
        meaning: fix_post_trade:PosMaintAction_1
      REPLACE:
        meaning: fix_post_trade:PosMaintAction_2
      CANCEL:
        meaning: fix_post_trade:PosMaintAction_3
      REVERSE:
        meaning: fix_post_trade:PosMaintAction_4

  ClearingServiceForPositionManagementEnum:
    description: |-
      Business functions invokable via the Position Management
      Clearing Services.
    permissible_values:
      POSITION_CHANGE_SUBMISSION:
      POSITION_ADJUSTMENT:
      EXERCISE_NOTICE:
      ABANDONMENT_NOTICE:
      MARGIN_DISPOSITION:
      POSITION_PLEDGE:
      REQUEST_FOR_POSITION:

  ClearingServiceForPostTradeProcessingEnum:
    description: |-
      Message-format families used by the Post-Trade Processing
      Clearing Services.
    permissible_values:
      ETP:
      GIVE_UP:
      EXCHANGE_FOR_PHYSICAL:
      AVERAGE_PRICE_SYSTEM:
      MUTUAL_OFFSET_SYSTEM:
      TRADE_ENTRY_EDIT:

  CollateralManagementUsageEnum:
    description: Documented uses of the Collateral Management messages.
    permissible_values:
      SECURITIES_FINANCING_COLLATERALIZATION:
      CLEARING_HOUSE_COLLATERALIZATION:

  CollateralAssignmentPurposeEnum:
    description: Purposes for which a CollateralAssignment may be sent.
    permissible_values:
      ASSIGN_INITIAL_COLLATERAL:
      REPLENISH_COLLATERAL:
      REPLACE_OR_SUBSTITUTE_COLLATERAL:

  AllocationRoleEnum:
    description: |-
      Role labels used throughout the Allocation category prose to
      designate the sender and receiver of an AllocationInstruction.
    permissible_values:
      INITIATOR:
      RESPONDENT:

  MatchStatusEnum:
    description: MatchStatus(573) values referenced in Post-Trade prose.
    permissible_values:
      COMPARED_MATCHED_OR_AFFIRMED:
        meaning: fix_post_trade:MatchStatus_0
      UNCOMPARED_UNMATCHED_OR_UNAFFIRMED:
        meaning: fix_post_trade:MatchStatus_1

  PostTradeLayoutRowKindEnum:
    description: |-
      Discriminator for a row in a Post-Trade message- or
      component-layout table: either a FIX field (numeric Tag
      column) or an embedded component (literal "Component" in
      the Tag column).
    permissible_values:
      FIELD:
      COMPONENT:

slots:
  post_introduction:
    description: Prose introduction of the Post-Trade chapter.
    range: string

  post_common_components:
    description: |-
      Common Components declared at the top of the Post-Trade
      chapter.
    range: PostTradeCommonComponentName
    multivalued: true

  post_footnotes:
    description: Footnotes attached to the area-wide components table.
    range: PostTradeComponentTableFootnote
    multivalued: true
    inlined: true
    inlined_as_list: true

  post_category_sections:
    description: Per-category sub-sections of the Post-Trade chapter.
    range: PostTradeCategorySection
    multivalued: true
    inlined: true
    inlined_as_list: true

  post_category_specific_components:
    description: |-
      Components used exclusively by messages within a category.
    range: PostTradeComponentDetail
    multivalued: true
    inlined: true
    inlined_as_list: true

  post_sole_category:
    description: |-
      Single Post-Trade category that actually uses the component
      (per footnote).
    range: PostTradeCategoryEnum

  post_message_groups:
    description: |-
      Purpose-grouped message descriptions inside a Post-Trade
      category.
    range: PostTradeMessageGroup
    multivalued: true
    inlined: true
    inlined_as_list: true

  post_common_component_details:
    description: |-
      Per-common-component descriptions from the chapter's final
      Common Components section.
    range: PostTradeCommonComponentDetail
    multivalued: true
    inlined: true
    inlined_as_list: true

  allocation_scenarios:
    description: |-
      Communication options supported by the Allocation category
      for conveying allocation instructions.
    range: AllocationScenarioEnum
    multivalued: true

  post_trade_allocation_pricing_methods:
    description: |-
      Methods supported for computing post-trade allocations.
    range: PostTradeAllocationPricingMethodEnum
    multivalued: true

  allocation_status_descriptions:
    description: |-
      Descriptions tied to AllocStatus(87) values as listed in the
      Allocation Instruction Acknowledgements section.
    range: AllocationStatusDescription
    multivalued: true
    inlined: true
    inlined_as_list: true

  fragmentation_field_map:
    description: |-
      Per-message mapping of fragmentation-related fields used by
      the Allocation messages.
    range: AllocationFragmentationFieldMap
    multivalued: true
    inlined: true
    inlined_as_list: true

  trade_capture_report_usages:
    description: |-
      Usages described in the "Trade Capture Report Usages"
      sub-section of the Trade Capture Reporting category.
    range: TradeCaptureReportUsage
    multivalued: true
    inlined: true
    inlined_as_list: true

  trade_capture_report_identifier_rules:
    description: |-
      Rules governing TradeCaptureReport(35=AE) identifier fields.
    range: TradeCaptureReportIdentifierRule
    multivalued: true
    inlined: true
    inlined_as_list: true

  registration_status_descriptions:
    description: |-
      Descriptions tied to RegistStatus(506) values.
    range: RegistrationStatusDescription
    multivalued: true
    inlined: true
    inlined_as_list: true

  clearing_services_for_position_management:
    description: |-
      Business functions exposed by the Position Management
      Clearing Services.
    range: ClearingServiceForPositionManagementEnum
    multivalued: true

  clearing_services_for_post_trade_processing:
    description: |-
      Per-format action sets exposed by the Post-Trade Processing
      Clearing Services.
    range: ClearingServicePostTradeProcessingFormat
    multivalued: true
    inlined: true
    inlined_as_list: true

  allocation_roles:
    description: |-
      Role labels used throughout the Allocation category prose.
    range: AllocationRoleEnum
    multivalued: true

  collateral_management_usages:
    description: |-
      Documented usages for the Collateral Management messages.
    range: CollateralManagementUsageEnum
    multivalued: true

  collateral_assignment_purposes:
    description: |-
      Documented purposes for the CollateralAssignment(35=AY)
      message.
    range: CollateralAssignmentPurposeEnum
    multivalued: true

  identifier_role:
    description: Role of the trade-capture-report identifier field.
    range: TradeCaptureReportIdentifierRoleEnum

  status_code:
    description: Wire status code as referenced in the chapter.
    range: string

  status_label:
    description: Human-readable label of the status code.
    range: string

  message_format:
    description: |-
      Clearing-service message format family referenced in the
      chapter.
    range: ClearingServiceForPostTradeProcessingEnum

  supported_actions:
    description: |-
      Action labels (e.g. Allocation, Accept, Reject, Release,
      Change, Delete) supported by a clearing-service message
      format.
    range: string
    multivalued: true

  principal_message_reference:
    description: |-
      Principal message reference field used to bind allocation
      message fragments together (e.g. AllocID, AllocReportID).
    range: string

  total_count_field:
    description: |-
      Field carrying the total number of repeating-group entries
      across all fragments (e.g. TotNoAllocs).
    range: string

  fragment_count_field:
    description: |-
      Field carrying the number of entries in the current message
      fragment (e.g. NoAllocs).
    range: string

  post_layout_rows:
    description: |-
      Ordered rows of the layout table published for the
      message or component in the Post-Trade Appendix.
    range: PostTradeLayoutRow
    multivalued: true
    inlined: true
    inlined_as_list: true

  post_layout_kind:
    description: |-
      Row kind — either a FIX field (numeric Tag) or an
      embedded component (literal "Component" in the Tag
      column of the source table).
    range: PostTradeLayoutRowKindEnum

  post_layout_field_tag:
    description: |-
      FIX tag number drawn from the Tag column when the row is
      a field (i.e. layout_kind = FIELD). Absent for COMPONENT
      rows.
    range: integer
    minimum_value: 0

  post_layout_element_name:
    description: |-
      Element name as printed in the Name column — either the
      FIX field name or the component name.
    range: string

  post_layout_required:
    description: |-
      Whether the field or component is required, as printed in
      the Req’d column of the source layout table ("Y" / "N").
    range: boolean

  post_layout_description:
    description: |-
      Free-text content of the Description column of the row
      (may be empty).
    range: string

  post_layout_nested:
    description: |-
      Whether the row appears nested under a repeating-group
      counter (i.e. its Tag column is prefixed with the "→"
      arrow in the source table).
    range: boolean
    ifabsent: "False"

classes:
  PostTradeBusinessArea:
    description: |-
      Tree-root container for the Post-Trade business area of FIX
      Latest.
    tree_root: true
    in_subset:
      - post_trade
    class_uri: fix_post_trade:PostTradeBusinessArea
    aliases:
      - Post-Trade
    see_also:
      - https://www.fixtrading.org/standards/fix-latest-online/business-area-post-trade/
    slots:
      - area
      - title
      - published_version
      - publisher
      - post_introduction
      - diagram_conventions
      - post_common_components
      - messages
      - components
      - post_footnotes
      - post_category_sections
      - post_common_component_details
      - messages_overview_note
      - components_overview_note
      - referenced_global_components
    slot_usage:
      area:
        required: true
        ifabsent: string(POST_TRADE)
      title:
        ifabsent: string(Business Area Post-Trade)
      publisher:
        ifabsent: string(FIX Global Technical Committee)
      messages:
        range: PostTradeMessageEntry
        inlined: true
        inlined_as_list: true
        required: true
      components:
        range: PostTradeComponentEntry
        inlined: true
        inlined_as_list: true
        required: true

  PostTradeMessageEntry:
    description: |-
      One row of the area-wide "Messages for Post-Trade Business
      Area" table.
    in_subset:
      - post_trade_organization
    class_uri: fix_post_trade:PostTradeMessageEntry
    slots:
      - msg_type
      - message_name
      - category
    slot_usage:
      msg_type:
        identifier: true
        required: true
      message_name:
        required: true
      category:
        range: PostTradeCategoryEnum
        required: true

  PostTradeComponentEntry:
    description: |-
      One row of the area-wide "Components for Post-Trade Business
      Area" table.
    in_subset:
      - post_trade_organization
    class_uri: fix_post_trade:PostTradeComponentEntry
    slots:
      - component_name
      - repetition
      - category
      - is_common
      - footnote_number
    slot_usage:
      component_name:
        identifier: true
        required: true
      repetition:
        required: true
      category:
        description: |-
          Category label as printed in the component table; the
          token "Common Components" is allowed in addition to the
          PostTradeCategoryEnum values.
        range: string
        required: true
      is_common:
        ifabsent: string(False)

  PostTradeComponentTableFootnote:
    description: |-
      A footnote attached to a row of the area-wide Post-Trade
      components table.
    in_subset:
      - post_trade_organization
    class_uri: fix_post_trade:PostTradeComponentTableFootnote
    slots:
      - footnote_number
      - component_name
      - introduced_in
      - post_sole_category
      - text
    slot_usage:
      footnote_number:
        identifier: true
        required: true
      component_name:
        required: true
      introduced_in:
        required: true
      post_sole_category:
        required: true

  PostTradeCategorySection:
    description: |-
      A "Category – <name>" sub-section of the Post-Trade chapter.
    in_subset:
      - post_trade
    class_uri: fix_post_trade:PostTradeCategorySection
    slots:
      - category
      - title
      - description
      - category_components_note
      - post_message_groups
      - messages
      - post_category_specific_components
      - allocation_scenarios
      - allocation_roles
      - post_trade_allocation_pricing_methods
      - allocation_status_descriptions
      - fragmentation_field_map
      - trade_capture_report_usages
      - trade_capture_report_identifier_rules
      - registration_status_descriptions
      - clearing_services_for_position_management
      - clearing_services_for_post_trade_processing
      - collateral_management_usages
      - collateral_assignment_purposes
    slot_usage:
      category:
        identifier: true
        required: true
        range: PostTradeCategoryEnum
      messages:
        range: PostTradeMessageDetail
        inlined: true
        inlined_as_list: true

  PostTradeMessageGroup:
    description: |-
      A purpose-themed grouping of messages within a Post-Trade
      category (e.g. "Allocation Instructions").
    in_subset:
      - post_trade
    class_uri: fix_post_trade:PostTradeMessageGroup
    slots:
      - group_title
      - messages
    slot_usage:
      group_title:
        identifier: true
        required: true
      messages:
        range: PostTradeMessageDetail
        inlined: true
        inlined_as_list: true
        required: true

  PostTradeMessageDetail:
    description: |-
      Per-message description block from a Post-Trade category
      section.
    in_subset:
      - post_trade
    class_uri: fix_post_trade:PostTradeMessageDetail
    slots:
      - msg_type
      - message_name
      - description
      - layout_url
      - post_layout_rows
    slot_usage:
      msg_type:
        identifier: true
        required: true
      message_name:
        required: true

  PostTradeComponentDetail:
    description: |-
      Per-component description block from a Post-Trade category
      section's Components sub-section.
    in_subset:
      - post_trade
    class_uri: fix_post_trade:PostTradeComponentDetail
    slots:
      - component_name
      - repetition
      - description
      - layout_url
      - post_layout_rows
    slot_usage:
      component_name:
        identifier: true
        required: true

  PostTradeCommonComponentDetail:
    description: |-
      Per-common-component description block from the chapter's
      final "Common Components" section.
    in_subset:
      - post_trade
    class_uri: fix_post_trade:PostTradeCommonComponentDetail
    slots:
      - component_name
      - repetition
      - description
      - layout_url
      - post_layout_rows
    slot_usage:
      component_name:
        identifier: true
        required: true
        range: PostTradeCommonComponentName

  AllocationStatusDescription:
    description: |-
      One row of the AllocStatus(87) value/description table.
    in_subset:
      - post_trade_workflow
    class_uri: fix_post_trade:AllocationStatusDescription
    slots:
      - status_code
      - status_label
      - description
    slot_usage:
      status_code:
        identifier: true
        required: true
      status_label:
        required: true

  AllocationFragmentationFieldMap:
    description: |-
      One row of the table mapping an allocation message to its
      fragmentation-related fields.
    in_subset:
      - post_trade_workflow
    class_uri: fix_post_trade:AllocationFragmentationFieldMap
    slots:
      - msg_type
      - message_name
      - total_count_field
      - fragment_count_field
      - principal_message_reference
    slot_usage:
      msg_type:
        identifier: true
        required: true
      message_name:
        required: true
      total_count_field:
        required: true
      fragment_count_field:
        required: true
      principal_message_reference:
        required: true

  TradeCaptureReportUsage:
    description: |-
      One documented usage of the TradeCaptureReport(35=AE)
      message.
    in_subset:
      - post_trade_workflow
    class_uri: fix_post_trade:TradeCaptureReportUsage
    slots:
      - status_label
      - description
      - identifier_role
    slot_usage:
      status_label:
        identifier: true
        required: true
        description: Short label for the usage.

  TradeCaptureReportIdentifierRule:
    description: |-
      A rule governing one of the TradeCaptureReport(35=AE)
      identifier fields.
    in_subset:
      - post_trade_workflow
    class_uri: fix_post_trade:TradeCaptureReportIdentifierRule
    slots:
      - identifier_role
      - description
    slot_usage:
      identifier_role:
        identifier: true
        required: true

  RegistrationStatusDescription:
    description: |-
      One row of the RegistStatus(506) value/description table.
    in_subset:
      - post_trade_workflow
    class_uri: fix_post_trade:RegistrationStatusDescription
    slots:
      - status_code
      - status_label
      - description
    slot_usage:
      status_code:
        identifier: true
        required: true
      status_label:
        required: true

  ClearingServicePostTradeProcessingFormat:
    description: |-
      One message-format row from the Post-Trade Processing
      Clearing Services section, with its supported actions.
    in_subset:
      - post_trade_workflow
    class_uri: fix_post_trade:ClearingServicePostTradeProcessingFormat
    slots:
      - message_format
      - supported_actions
    slot_usage:
      message_format:
        identifier: true
        required: true
      supported_actions:
        required: true

  PostTradeLayoutRow:
    description: |-
      One row of the layout table published in the Post-Trade
      Appendix for a message or component. Each row identifies
      either a FIX field (by tag number + name) or an embedded
      component (by name), records whether it is required,
      carries the Description-column text, and flags whether it
      appears as a nested child of a repeating-group counter.
    in_subset:
      - post_trade
    class_uri: fix_post_trade:PostTradeLayoutRow
    see_also:
      - https://www.fixtrading.org/standards/fix-latest-online/post-trade-appendix/
    slots:
      - post_layout_kind
      - post_layout_field_tag
      - post_layout_element_name
      - post_layout_required
      - post_layout_description
      - post_layout_nested
    slot_usage:
      post_layout_kind:
        required: true
      post_layout_element_name:
        required: true
