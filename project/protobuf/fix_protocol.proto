// One row of a "Standard Responses for <area> Messages" table mapping a request message to its appropriate response(s).
message StandardResponseMapping
 {
  string categoryLabel = 0
  string fixMessage = 0
  string appropriateResponses = 0
 }
// Tree-root container for the Trade Appendix — the spec companion document that publishes the full message- and component-layout tables for every message and component used in the Trade business area, organized into one "Appendix – <X> Category" sub-section per Trade category plus a final "Appendix – Common Category" sub-section covering the layouts of the chapter's common components.
message TradeAppendix
 {
  string title = 0
  string publishedVersion = 0
  string publisher = 0
  string description = 0
 repeated  tradeAppendixSection tradeAppendixSections = 0
 }
// One "Appendix – <X> Category" sub-section of the Trade Appendix. Bundles the per-message layout tables (TradeMessageDetail) and per-component layout tables (TradeComponentDetail) for messages and components that belong to one Trade category — or, for the synthetic "Common" section, the layouts of the chapter's common components.
message TradeAppendixSection
 {
  string tradeAppendixCategory = 0
  string title = 0
  string description = 0
 repeated  tradeMessageDetail messages = 0
 repeated  tradeComponentDetail components = 0
 }
// Tree-root container for the Trade (Orders and Executions) business area of FIX Latest.
message TradeBusinessArea
 {
  businessAreaEnum tradeArea = 0
  string title = 0
  string publishedVersion = 0
  string publisher = 0
  string tradeIntroduction = 0
  string tradeDiagramConventions = 0
  uri tradeMessageDiagramTemplateUrl = 0
  string tradeMessagesOverviewNote = 0
 repeated  tradeMessageEntry messages = 0
  string tradeComponentsOverviewNote = 0
 repeated  tradeComponentEntry components = 0
 repeated  tradeCommonComponentName tradeCommonComponents = 0
 repeated  tradeCommonComponentDetail tradeCommonComponentDetails = 0
 repeated  tradeComponentTableFootnote tradeFootnotes = 0
 repeated  tradeCategorySection tradeCategorySections = 0
 repeated  globalComponent referencedGlobalComponents = 0
 }
