 repeated  allocationFragmentationFieldMap fragmentationFieldMap = 0
 repeated  tradeCaptureReportUsage tradeCaptureReportUsages = 0
 repeated  tradeCaptureReportIdentifierRule tradeCaptureReportIdentifierRules = 0
 repeated  registrationStatusDescription registrationStatusDescriptions = 0
 repeated  clearingServiceForPositionManagementEnum clearingServicesForPositionManagement = 0
 repeated  clearingServicePostTradeProcessingFormat clearingServicesForPostTradeProcessing = 0
 repeated  collateralManagementUsageEnum collateralManagementUsages = 0
 repeated  collateralAssignmentPurposeEnum collateralAssignmentPurposes = 0
 }
// Per-common-component description block from the chapter's final "Common Components" section.
message PostTradeCommonComponentDetail
 {
  postTradeCommonComponentName componentName = 0
  componentRepetition repetition = 0
  string description = 0
  uri layoutUrl = 0
 repeated  postTradeLayoutRow postLayoutRows = 0
 }
// Per-component description block from a Post-Trade category section's Components sub-section.
message PostTradeComponentDetail
 {
  string componentName = 0
  componentRepetition repetition = 0
  string description = 0
  uri layoutUrl = 0
 repeated  postTradeLayoutRow postLayoutRows = 0
