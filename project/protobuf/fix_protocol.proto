message PostTradeBusinessArea
 {
  businessAreaEnum area = 0
  string title = 0
  string publishedVersion = 0
  string publisher = 0
  string postIntroduction = 0
  string diagramConventions = 0
 repeated  postTradeCommonComponentName postCommonComponents = 0
 repeated  postTradeMessageEntry messages = 0
 repeated  postTradeComponentEntry components = 0
 repeated  postTradeComponentTableFootnote postFootnotes = 0
 repeated  postTradeCategorySection postCategorySections = 0
