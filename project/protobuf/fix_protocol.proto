 syntax="proto3";
 package
// metamodel_version: 1.11.0
// One row of the table mapping an allocation message to its fragmentation-related fields.
message AllocationFragmentationFieldMap
 {
  string msgType = 0
  string messageName = 0
  string totalCountField = 0
  string fragmentCountField = 0
  string principalMessageReference = 0
 }
// One row of the AllocStatus(87) value/description table.
message AllocationStatusDescription
 {
  string statusCode = 0
  string statusLabel = 0
  string description = 0
 }
// One row of a "Key Fields for <area> Application Message References" table identifying the field whose value is copied into BusinessRejectRefID(379).
message ApplicationMessageReferenceKey
 {
  string categoryLabel = 0
  string fixMessage = 0
  string businessRejectRefIdValue = 0
 }
// A top-level business area of the FIX Latest specification.
message BusinessArea
 {
  businessAreaEnum area = 0
  string title = 0
  string description = 0
 repeated  messageCategory categories = 0
 }
// One entry of the BusinessRejectReason(380) code table.
message BusinessRejectReasonDescription
 {
  integer rejectReasonCode = 0
  string rejectReasonLabel = 0
 }
// One message-format row from the Post-Trade Processing Clearing Services section, with its supported actions.
message ClearingServicePostTradeProcessingFormat
 {
  clearingServiceForPostTradeProcessingEnum messageFormat = 0
 repeated  string supportedActions = 0
 }
// A component used only by messages within a single business area.
message CommonComponent
 {
  string componentName = 0
  string description = 0
  boolean isRepeatingGroup = 0
 repeated  field fields = 0
 repeated  component nestedComponents = 0
  businessAreaEnum businessArea = 0
  componentScope scope = 0
 }
// Per-common-component description.
message CommonComponentDetail
 {
  preTradeCommonComponentName componentName = 0
  componentRepetition repetition = 0
  string description = 0
  uri layoutUrl = 0
 repeated  preTradeLayoutRow preLayoutRows = 0
 }
// A footnote on the area-wide components table.
message ComponentTableFootnote
 {
  integer footnoteNumber = 0
  string componentName = 0
  string introducedIn = 0
  preTradeCategoryEnum soleCategory = 0
  string text = 0
 }
// A unit of change to FIX Latest.
message ExtensionPack
 {
  extensionPackNumber number = 0
  string title = 0
  extensionPackSize size = 0
  string enhancementSummary = 0
  boolean appliesToSessionLayerOnly = 0
  boolean appliesToFixmlOnly = 0
 }
// A FIX field — a uniquely tagged data element with a FIX datatype.
message Field
 {
  tagNumber tag = 0
  string fieldName = 0
  fIXDatatypeName datatype = 0
  string description = 0
  fieldRequirement requirement = 0
  boolean isUserDefined = 0
 }
// A FIX Protocol datatype.
message FIXDatatype
 {
  fIXDatatypeName datatypeName = 0
  string definition = 0
 repeated  iSO11404ValueSpace valueSpace = 0
  string valueSpaceNotes = 0
  boolean deprecatedForNewDesigns = 0
  string externalCodeSet = 0
 repeated  timePrecision timeUnit = 0
  integer radix = 0
  string repertoire = 0
  integer indexLowerBound = 0
  integer indexUpperBound = 0
  integer minimumValue = 0
  integer maximumValue = 0
 repeated  integer footnoteNumbers = 0
 }
// A member standard of the FIX Family of Standards.
message FIXFamilyStandard
 {
  string id = 0
  string name = 0
  string description = 0
  string acronym = 0
 repeated  uri seeAlso = 0
  standardLayer layer = 0
  string version = 0
  sessionProtocolName sessionProfile = 0
  standardEncodingName encodingName = 0
 }
// Container for the structural elements of the FIX Latest Introduction section. Tree root for instance data.
message FIXIntroduction
 {
  string publishedVersion = 0
  date publishedDate = 0
  string publisher = 0
  string preface = 0
  string introductionText = 0
  string utcLeapSecondsNote = 0
  fIXProtocolLimited aboutFpl = 0
 repeated  fIXFamilyStandard standards = 0
 repeated  extensionPack extensionPacks = 0
 repeated  fIXDatatype datatypes = 0
 repeated  businessArea businessAreas = 0
 repeated  globalComponent globalComponents = 0
 repeated  uDFTagRange udfRanges = 0
 repeated  productCoverage productCoverage = 0
 }
// The organization that maintains the FIX Protocol specification.
message FIXProtocolLimited
 {
  string brandName = 0
  string legalName = 0
  uri website = 0
  uri memberFirmsUrl = 0
  uri workingGroupsUrl = 0
  uri committeesUrl = 0
 repeated  fPLMemberType memberTypes = 0
 repeated  fPLCommitteeRole governanceBodies = 0
 repeated  fPLProductGroup productCommittees = 0
 repeated  fPLRegion regionalCommittees = 0
 }
// A component shared by messages of two or more business areas.
message GlobalComponent
 {
  string componentName = 0
  string description = 0
  boolean isRepeatingGroup = 0
 repeated  field fields = 0
 repeated  component nestedComponents = 0
  componentGroup componentGroup = 0
  boolean appliesToInstrument = 0
  boolean appliesToLeg = 0
  boolean appliesToUnderlying = 0
 repeated  string conceptuallyIdenticalTo = 0
  integer gcId = 0
 repeated  globalComponentBusinessAreaEnum gcReferencedIn = 0
  componentScope scope = 0
 }
// Tree-root container for the Infrastructure business area of FIX Latest.
message InfrastructureBusinessArea
 {
  businessAreaEnum area = 0
  string title = 0
  string publishedVersion = 0
  string publisher = 0
  string infraIntroduction = 0
  string diagramConventions = 0
 repeated  infrastructureComponentName infraCommonComponents = 0
 repeated  infrastructureMessageEntry messages = 0
  string messagesOverviewNote = 0
 repeated  infrastructureComponentEntry components = 0
  string componentsOverviewNote = 0
 repeated  infrastructureComponentTableFootnote infraFootnotes = 0
 repeated  infrastructureCategorySection infraCategorySections = 0
 repeated  standardResponseMapping standardResponsesPreTrade = 0
 repeated  standardResponseMapping standardResponsesTrade = 0
 repeated  standardResponseMapping standardResponsesPostTrade = 0
 repeated  applicationMessageReferenceKey keyFieldsPreTrade = 0
 repeated  applicationMessageReferenceKey keyFieldsTrade = 0
 repeated  applicationMessageReferenceKey keyFieldsPostTrade = 0
 repeated  businessRejectReasonDescription businessRejectReasonDescriptions = 0
 repeated  infrastructureGlobalComponentReference infraGlobalComponents = 0
 repeated  globalComponent referencedGlobalComponents = 0
 }
// A "Category – <name>" sub-section of the Infrastructure chapter.
message InfrastructureCategorySection
 {
  infrastructureCategoryEnum category = 0
  string title = 0
  string description = 0
  string categoryComponentsNote = 0
 repeated  infrastructureMessageDetail messages = 0
 repeated  infrastructureComponentDetail infraCategorySpecificComponents = 0
 repeated  networkStatusScenarioEnum networkStatusScenarios = 0
 repeated  networkRequestTypeEnum networkRequestTypesReferenced = 0
 repeated  applicationMessageReportTypeEnum applicationMessageReportUses = 0
 }
// Per-component description appearing in a category's Components sub-section.
message InfrastructureComponentDetail
 {
  string componentName = 0
  componentRepetition repetition = 0
  string description = 0
  uri layoutUrl = 0
 repeated  infrastructureLayoutRow infraLayoutRows = 0
 }
// One row of the area-wide "Components for Infrastructure Business Area" table.
message InfrastructureComponentEntry
 {
  string componentName = 0
  componentRepetition repetition = 0
  infrastructureCategoryEnum category = 0
  integer footnoteNumber = 0
 }
// A footnote attached to a row of the area-wide Infrastructure components table.
message InfrastructureComponentTableFootnote
 {
  integer footnoteNumber = 0
  string componentName = 0
  string introducedIn = 0
  infrastructureCategoryEnum infraSoleCategory = 0
  string text = 0
 }
// A reference from the Infrastructure business area to a Global Component declared on the FIX Latest "Global Components" page. Records the component name, the FIX tags it contributes, and the Infrastructure categories and messages that embed it.
message InfrastructureGlobalComponentReference
 {
  infrastructureGlobalComponentName infraGlobalComponentName = 0
  string infraGlobalComponentRepetition = 0
 repeated  integer infraGlobalComponentFieldTags = 0
 repeated  string infraGlobalComponentFieldNames = 0
 repeated  infrastructureCategoryEnum infraGlobalComponentUsedIn = 0
 repeated  string infraGlobalComponentMsgTypes = 0
 }
// One row of the layout table published in the Infrastructure Appendix for a message or component. Each row identifies either a FIX field (by tag number + name) or an embedded component (by name), records whether it is required, carries the Description-column text, and flags whether it appears as a nested child of a repeating-group counter.
message InfrastructureLayoutRow
 {
  infrastructureLayoutRowKindEnum infraLayoutKind = 0
  integer infraLayoutFieldTag = 0
  string infraLayoutElementName = 0
  boolean infraLayoutRequired = 0
  string infraLayoutDescription = 0
  boolean infraLayoutNested = 0
 }
// Per-message description appearing in a category's Messages sub-section.
message InfrastructureMessageDetail
 {
  string msgType = 0
  string messageName = 0
  string description = 0
  uri layoutUrl = 0
 repeated  infrastructureLayoutRow infraLayoutRows = 0
 }
// One row of the area-wide "Messages for Infrastructure Business Area" table.
message InfrastructureMessageEntry
 {
  string msgType = 0
  string messageName = 0
  infrastructureCategoryEnum category = 0
 }
// A FIX application message.
message Message
 {
  string msgType = 0
  string messageName = 0
  string description = 0
  messageCategoryEnum category = 0
 repeated  field fields = 0
 repeated  component components = 0
 }
// A message category within a business area.
message MessageCategory
 {
  messageCategoryEnum category = 0
  string title = 0
  string description = 0
  businessAreaEnum businessArea = 0
 repeated  message messages = 0
 }
// Purpose-grouped sub-section inside a category's Messages section.
message MessageGroup
 {
  string groupTitle = 0
  string description = 0
 repeated  preTradeMessageDetail messages = 0
 }
