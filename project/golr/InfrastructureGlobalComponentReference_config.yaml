  display_name: infra_global_component_field_names
  cardinality: multi
- id: infra_global_component_used_in
  description: Infrastructure categories that reference the Global Component.
  display_name: InfrastructureGlobalComponentReference_infra_global_component_used_in
  cardinality: multi
