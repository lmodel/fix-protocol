# metamodel_version: 1.11.0id: PostTradeLayoutRow
schema_generating: true
description: One row of the layout table published in the Post-Trade Appendix for
  a message or component. Each row identifies either a FIX field (by tag number +
  name) or an embedded component (by name), records whether it is required, carries
  the Description-column text, and flags whether it appears as a nested child of a
  repeating-group counter.
display_name: PostTradeLayoutRow
document_category: PostTradeLayoutRow
weight: 20
fields:
- id: post_layout_kind
  description: "Row kind \u2014 either a FIX field (numeric Tag) or an embedded component\
    \ (literal \"Component\" in the Tag column of the source table)."
  display_name: PostTradeLayoutRow_post_layout_kind
- id: post_layout_field_tag
  description: FIX tag number drawn from the Tag column when the row is a field (i.e.
    layout_kind = FIELD). Absent for COMPONENT rows.
  display_name: post_layout_field_tag
- id: post_layout_element_name
  description: "Element name as printed in the Name column \u2014 either the FIX field\
    \ name or the component name."
  display_name: PostTradeLayoutRow_post_layout_element_name
- id: post_layout_required
  description: "Whether the field or component is required, as printed in the Req\u2019\
    d column of the source layout table (\"Y\" / \"N\")."
  display_name: post_layout_required
- id: post_layout_description
  description: Free-text content of the Description column of the row (may be empty).
  display_name: post_layout_description
- id: post_layout_nested
  description: "Whether the row appears nested under a repeating-group counter (i.e.\
    \ its Tag column is prefixed with the \"\u2192\" arrow in the source table)."
  display_name: post_layout_nested
