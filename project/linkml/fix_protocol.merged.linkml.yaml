      "base": "int",
      "uri": "xsd:integer",
      "minimum_value": 1
    },
    "ExtensionPackNumber": {
      "name": "ExtensionPackNumber",
      "description": "Sequential identifier of a FIX Extension Pack. Carried on the wire in ApplExtID(1156).",
